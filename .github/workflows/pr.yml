name: PR Checks

on:
  pull_request:

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate all projects (lint + test)
        run: bunx nx run-many --target=validate --parallel
